user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Inyectado dinámicamente por entrypoint.sh de /etc/resolv.conf
    resolver DNS_RESOLVER_IP valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name localhost api-agm.up.railway.app;

        # Configuración centralizada de CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ==========================================
        # MS-1: Auth
        # ==========================================
        location = /api/auth/health {
            # NOTA: Ajustar con el dominio interno de tu servicio en Railway si difiere de ms-auth
            set $ms_auth ms-auth.railway.internal;
            proxy_pass http://$ms_auth:8001/health;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/auth/ {
            set $ms_auth ms-auth.railway.internal;
            rewrite ^/api/auth/(.*) /auth/$1 break;
            proxy_pass http://$ms_auth:8001;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ==========================================
        # MS-2: Periodos y Materias
        # ==========================================
        location ~ ^/api/v1/(periodos|planes-estudio|materias-catalogo|materias-planes-estudio|materias-ofertadas|materia-horarios|importaciones|materias)(/.*)?$ {
            set $ms_periodos ms-periodos-materias.railway.internal;
            proxy_pass http://$ms_periodos:8002$request_uri;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/periodos/ {
            set $ms_periodos ms-periodos-materias.railway.internal;
            rewrite ^/api/periodos/(.*) /api/v1/$1 break;
            proxy_pass http://$ms_periodos:8002;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ==========================================
        # MS-3: Docentes y Alumnos
        # ==========================================
        location = /api/alumnos/health {
            # NOTA: Ajustar con el dominio interno de tu servicio en Railway si difiere de ms-docentes-alumnos
            set $ms_docentes ms-docentes-alumnos.railway.internal;
            proxy_pass http://$ms_docentes:8003/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/alumnos/ {
            set $ms_docentes ms-docentes-alumnos.railway.internal;
            rewrite ^/api/alumnos/(.*) /api/v1/$1 break;
            proxy_pass http://$ms_docentes:8003;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ==========================================
        # MS-4: Calificaciones
        # ==========================================
        location /api/calificaciones/ {
            set $ms_calificaciones ms-calificaciones.railway.internal;
            rewrite ^/api/calificaciones/(.*) /api/v1/$1 break;
            proxy_pass http://$ms_calificaciones:8004;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ==========================================
        # MS-5: Asistencias
        # ==========================================
        location /api/asistencias/ {
            set $ms_asistencias ms-asistencias.railway.internal;
            rewrite ^/api/asistencias/(.*) /$1 break;
            proxy_pass http://$ms_asistencias:8005;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ==========================================
        # MS-6: Notificaciones (Usa URL pública segura o dominio interno de Railway)
        # ==========================================
        location = /api/notificaciones/health {
            # Se usa el dominio interno de notificaciones para evitar exponer tráfico público
            set $ms_notificaciones ms-notificaciones.railway.internal;
            proxy_pass http://$ms_notificaciones:8006/health;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/notificaciones/ {
            set $ms_notificaciones ms-notificaciones.railway.internal;
            rewrite ^/api/notificaciones/(.*) /api/v1/notificaciones/$1 break;
            proxy_pass http://$ms_notificaciones:8006;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ==========================================
        # MS-7: Reportes
        # ==========================================
        location = /api/reportes/health {
            set $ms_reportes ms-reportes.railway.internal;
            proxy_pass http://$ms_reportes:8007/health;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/reportes/ {
            set $ms_reportes ms-reportes.railway.internal;
            rewrite ^/api/reportes/(.*) /api/v1/$1 break;
            proxy_pass http://$ms_reportes:8007;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}

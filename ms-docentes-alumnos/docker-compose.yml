services:
  db-docentes:
    image: postgres:15
    container_name: db-docentes-alumnos
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432" # Accesible en Fedora vía 5433
    volumes:
      - postgres_data_ms3:/var/lib/postgresql/data

  ms-docentes-alumnos:
    build: .
    container_name: ms-docentes-alumnos
    restart: always
    ports:
      - "8003:8003"   # API REST (FastAPI)
      - "50053:50053" # Servidor gRPC del MS-3
    volumes:
      - .:/app  # Sincroniza tu código local con el contenedor
    environment:
      # Conexión a la DB interna
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-docentes:5432/${POSTGRES_DB}
      
      # Direcciones para los clientes gRPC (MS-1, MS-2, MS-6)
      MS1_HOST: ms-auth
      MS1_PORT: "50051"
      MS2_HOST: ms-periodos-materias
      MS2_PORT: "50052"
      MS6_HOST: ms-notificaciones
      MS6_PORT: "50056"
    depends_on:
      - db-docentes

volumes:
  postgres_data_ms3:
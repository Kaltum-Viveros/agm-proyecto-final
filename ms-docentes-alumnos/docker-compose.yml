version: '3.8'

services:
  db-docentes:
    image: postgres:15
    container_name: db-docentes-alumnos
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432" # Lo dejamos en 5433 para que no choque con tu Postgres local de Fedora
    volumes:
      - postgres_data_ms3:/var/lib/postgresql/data

  ms-docentes-alumnos:
    build: .
    container_name: ms-docentes-alumnos
    restart: always
    ports:
      - "8003:8003"  # Puerto HTTP (REST) según tu tabla
      - "50053:50053" # Puerto gRPC según tu tabla
    environment:
      # Importante: aquí la API busca al contenedor 'db-docentes' por su nombre interno
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-docentes:5432/${POSTGRES_DB}
    depends_on:
      - db-docentes

volumes:
  postgres_data_ms3:

